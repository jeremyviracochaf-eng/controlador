version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: control_acceso_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./Bd/control_acceso.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 400M

  web:
    build: ./Backend
    container_name: control_acceso_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 400M

volumes:
  db_data: