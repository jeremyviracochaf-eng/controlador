<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Auditoría</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Auditoría del Sistema</h2>

    <a href="/dashboard"
       class="btn btn-secondary mb-3">

       Volver

    </a>

    <table class="table table-bordered table-striped">

        <thead>

            <tr>
                <th>ID</th>
                <th>Administrador</th>
                <th>Acción</th>
                <th>Fecha</th>
            </tr>

        </thead>

        <tbody>

            {% for r in registros %}

            <tr>

                <td>{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td>{{ r[2] }}</td>
                <td>{{ r[3] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
