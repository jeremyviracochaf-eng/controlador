<!DOCTYPE html>
<html>

<head>

<title>Nuevo Usuario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Registrar Usuario</h2>

    <form action="/guardar_usuario" method="POST">

        <div class="mb-3">

            <label>Nombre</label>

            <input
                type="text"
                name="nombre"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>UID RFID</label>

            <input
                type="text"
                name="uid"
                id="uid"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Rol</label>

            <select
                name="rol"
                class="form-control">

                <option>Administrador</option>
                <option>Docente</option>
                <option>Estudiante</option>

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-primary">

            Guardar

        </button>

    </form>

</div>

<script>

function cargarUID() {

    fetch('/obtener_uid')
    .then(response => response.json())
    .then(data => {

        if(data.uid){

            document.getElementById("uid").value = data.uid;
        }

    });

}

setInterval(cargarUID, 2000);

</script>

</body>

</html>
