<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Control de Acceso RFID</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0a0e13 100%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: var(--spacing-md);
        }

        .login-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: var(--spacing-2xl);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp var(--transition-base);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-lg);
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .login-form {
            margin-bottom: var(--spacing-lg);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            font-size: 0.95rem;
        }

        .form-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input-icon {
            position: absolute;
            left: var(--spacing-md);
            color: var(--text-tertiary);
            pointer-events: none;
            font-size: 1rem;
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: var(--spacing-md) var(--spacing-md) var(--spacing-md) 40px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all var(--transition-base);
            font-family: inherit;
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
        }

        .form-control:focus {
            background-color: var(--bg-tertiary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
            color: white;
            border: none;
            border-radius: 8px;
            padding: var(--spacing-md) var(--spacing-lg);
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login i {
            font-size: 1.1rem;
        }

        .login-footer {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }

        .login-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            transition: all var(--transition-base);
        }

        .login-footer a:hover {
            color: var(--accent-primary-hover);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-wrapper {
                padding: var(--spacing-md);
            }

            .login-card {
                padding: var(--spacing-lg);
            }

            .login-title {
                font-size: 1.5rem;
            }

            .login-icon {
                width: 56px;
                height: 56px;
                font-size: 1.5rem;
            }
        }

        /* ================= ALERTA LOGIN ================= */

        .alert-error {
            display: flex;
            align-items: center;
            gap: 12px;

            width: 100%;
            padding: 14px 16px;
            margin-bottom: var(--spacing-lg);

            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-left: 4px solid #ef4444;
            border-radius: 10px;

            color: #fca5a5;
            font-size: .92rem;
            font-weight: 500;

            animation: alertFade .35s ease;
        }

        .alert-error i {
            color: #ef4444;
            font-size: 1rem;
            flex-shrink: 0;
        }

        @keyframes alertFade {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="login-title">Control de Acceso</h1>
                <p class="login-subtitle">Sistema RFID Avanzado</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert-error">
                <i class="fas fa-circle-exclamation"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            
            <form action="/login" method="POST" class="login-form">
                <div class="form-group">
                    <label for="usuario" class="form-label">
                        <i class="fas fa-user"></i> Usuario
                    </label>
                    <div class="form-input-group">
                        <i class="fas fa-user form-input-icon"></i>
                        <input type="text" id="usuario" name="usuario" class="form-control"
                            placeholder="Ingrese su usuario" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <div class="form-input-group">
                        <i class="fas fa-lock form-input-icon"></i>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Ingrese su contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Ingresar al Sistema
                </button>
            </form>

            <div class="login-footer">
                <p>Sistema seguro de control de acceso por RFID</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
