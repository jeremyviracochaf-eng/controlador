<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Registrar Tarjeta RFID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Registro de Tarjeta RFID</h2>

    <hr>

    <div class="alert alert-warning">
        Acerque una tarjeta o llavero RFID al lector.
    </div>

    <div class="card">
        <div class="card-body">
            <h4>UID Detectado</h4>
            <h2 id="uidDetectado">
                Esperando...
            </h2>
        </div>
    </div>

    <br>

    <a href="/nuevo_usuario" class="btn btn-success">
        Continuar Registro
    </a>

</div>

<script>
fetch('/limpiar_uid');

function obtenerUID() {
    fetch('/obtener_uid')
    .then(response => response.json())
    .then(data => {
        if(data.uid){
            document.getElementById("uidDetectado").innerText = data.uid;
        }
    });
}

setInterval(obtenerUID, 1000);
</script>

</body>
</html>
