<!DOCTYPE html>
<html>
<head>

<title>Editar Usuario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Editar Usuario</h2>

    <form action="/actualizar_usuario" method="POST">

        <input
            type="hidden"
            name="id"
            value="{{ usuario[0] }}">

        <div class="mb-3">

            <label>Nombre</label>

            <input
                type="text"
                name="nombre"
                class="form-control"
                value="{{ usuario[1] }}"
                required>

        </div>

        <div class="mb-3">

            <label>UID RFID</label>

            <input
                type="text"
                name="uid"
                class="form-control"
                value="{{ usuario[2] }}"
                required>

        </div>

        <div class="mb-3">

            <label>Rol</label>

            <input
                type="text"
                name="rol"
                class="form-control"
                value="{{ usuario[3] }}"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Guardar Cambios

        </button>

        <a href="/usuarios"
           class="btn btn-secondary">

           Cancelar

        </a>

    </form>

</div>

</body>
</html>
