<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario - Control RFID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: linear-gradient(135deg, #0066cc 0%, #004d99 100%);
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.2);
            padding: 1rem 0;
        }

        .navbar-brand {
            color: white !important;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .main-content {
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .form-title {
            color: #1a1a1a;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            color: #1a1a1a;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: white;
        }

        .form-control:focus {
            border-color: #0066cc;
            box-shadow: 0 0 0 0.2rem rgba(0, 102, 204, 0.15);
            background-color: white;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.3);
        }

        .btn-cancel {
            flex: 1;
            background-color: #e0e0e0;
            color: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .btn-cancel:hover {
            background-color: #d0d0d0;
            color: #1a1a1a;
        }

        .info-badge {
            background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%);
            border-left: 4px solid #0066cc;
            padding: 12px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.9rem;
            color: #0066cc;
        }

        @media (max-width: 768px) {
            .form-card {
                padding: 30px 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="container-fluid px-4">
        <a href="/dashboard" class="navbar-brand">
            <i class="fas fa-lock"></i> Sistema RFID
        </a>
    </div>
</nav>

<div class="main-content">
    <div class="form-card">
        <h1 class="form-title">
            <i class="fas fa-user-edit"></i> Editar Usuario
        </h1>

        <form action="/actualizar_usuario" method="POST">
            <input type="hidden" name="id" value="{{ usuario[0] }}">

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-hashtag"></i> ID de Usuario
                </label>
                <div class="info-badge">
                    <strong>ID:</strong> {{ usuario[0] }}
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user"></i> Nombre Completo
                </label>
                <input
                    type="text"
                    name="nombre"
                    class="form-control"
                    value="{{ usuario[1] }}"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-id-card"></i> UID RFID
                </label>
                <input
                    type="text"
                    name="uid"
                    class="form-control"
                    value="{{ usuario[2] }}"
                    required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-briefcase"></i> Rol
                </label>
                <input
                    type="text"
                    name="rol"
                    class="form-control"
                    value="{{ usuario[3] }}"
                    required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
                <a href="/usuarios" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
